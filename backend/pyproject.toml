[project]
name = "menagerist"
dynamic = ["version"]
summary = "Menagerist - Collection Manager"
description = "A lightweight, self-hostable personal knowledge graph for collectors."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.17.2",
    "asyncpg>=0.31.0",
    "fastapi>=0.124.4",
    "granian>=2.7.0",
    "pydantic-settings>=2.12.0",
    "sqlalchemy[asyncio]>=2.0.45",
]

[dependency-groups]
dev = [
    "granian[reload]>=2.7.0",
    "mypy>=1.19.1",
    "pre-commit>=4.5.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.9",
    "setuptools-scm>=10.0.5",
]

[tool.uv.sources]
menagerist-versioning = { path = "../versioning" }

[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.4.0", "menagerist-versioning>=0.1.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["src/app"]

[tool.hatch.version.raw-options]
search_parent_directories = true
version_scheme = "menagerist_calver"
local_scheme = "no-local-version"

[tool.mypy]
python_version = "3.14"
strict = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = true
show_error_codes = true
explicit_package_bases = true
namespace_packages = true
mypy_path = "src"
files = ["src/app", "tests"]

[[tool.mypy.overrides]]
module = ["granian.*"]
ignore_missing_imports = true

[tool.ruff]
fix = true
target-version = "py314"
line-length = 88

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "N",      # pep8-naming
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "D",      # pydocstyle — replaces pydocstyle tool
    "RUF",    # ruff-specific rules
    "PT",     # flake8-pytest-style
    "ANN",    # flake8-annotations
]
ignore = [
    # formatter conflicts per https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
    "W191",   # tab-indentation
    "E111",   # indentation-with-invalid-multiple
    "E114",   # indentation-with-invalid-multiple-comment
    "E117",   # over-indented
    "D206",   # docstring-tab-indentation
    "D300",   # triple-single-quotes
    "Q000",   # bad-quotes-inline-string
    "Q001",   # bad-quotes-multiline-string
    "Q002",   # bad-quotes-docstring
    "Q003",   # avoidable-escaped-quote
    "Q004",   # unnecessary-escaped-quote
    "COM812", # missing-trailing-comma
    "COM819", # prohibited-trailing-comma
    "ISC002", # multi-line-implicit-string-concatenation
    # project-specific
    "B008",   # FastAPI Depends() in defaults
    "D100",   # missing docstring in public module
    "D104",   # missing docstring in public package
    "D107",   # missing docstring in __init__
]
fixable = ["ALL"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["app"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "D", "PT"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
pythonpath = ["src"]
testpaths = ["tests"]
addopts = [
    "--cov=src/app",
    "--cov-report=term-missing",
    "--strict-markers",
    "--tb=short",
]
markers = [
    "unit: fast, no infrastructure",
    "integration: requires database",
    "e2e: full stack",
]

[tool.coverage.run]
source = ["src/app"]
omit = [
    "tests/*",
    "**/__init__.py",
    "src/app/_version.py",
    "src/app/migrations/*",
]

[tool.coverage.report]
fail_under = 85
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@abstractmethod",
]
