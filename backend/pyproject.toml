[project]
name = "chronicle"
version = "0.0.0-alpha"
description = "A lightweight, self-hostable platform for organising collections, events, signatures, photoshoots, selfies, and people."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.124.4",
    "uvicorn[standard]>=0.38.0",
]

[dependency-groups]
dev = [
    "black>=25.12.0",
    "mypy>=1.19.0",
    "pre-commit>=4.5.0",
    "pydocstyle>=6.3.0",
    "ruff>=0.14.9",
]

[build-system]
requires = [ "hatchling>=0.21.2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = ["app"]

[tool.mypy]
disallow_untyped_defs = true   # fail if a function has no type hints
disallow_incomplete_defs = true
strict_optional = true
ignore_missing_imports = true  # skip type-checking for external packages
warn_unused_ignores = true
warn_return_any = true

[tool.pydocstyle]
convention = "google"
add-ignore = ["D212"]
add-select = ["D213"]

[tool.black]

[tool.ruff]
fix = true
